<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kočičí věštírna</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="cat-card">
        <div class="cat-ear ear-left">
          <div class="ear-inner"></div>
        </div>
        <div class="cat-ear ear-right">
          <div class="ear-inner"></div>
        </div>
        <div class="cat-face">
          <div class="cat-fur"></div>
          <div class="cat-eye eye-left"><span class="cat-pupil"></span></div>
          <div class="cat-eye eye-right"><span class="cat-pupil"></span></div>
          <div class="cat-nose"></div>
          <div class="cat-muzzle"></div>
          <div class="cat-mouth"></div>
          <div class="cat-whiskers whiskers-left"></div>
          <div class="cat-whiskers whiskers-right"></div>
        </div>
      </div>
      <h1>Kočičí věštírna</h1>
      <p>Stiskni tlačítko a kočka ti poví svůj výrok.</p>
      <button id="prophet-btn">Získat věštbu</button>
      <div id="fortune" class="fortune"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
